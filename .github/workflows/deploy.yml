name: Build and deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

env:
  DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
  IMAGE: ghcr.io/${{ github.repository }}:sha-${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  build:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out the tested revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push immutable image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          build-args: PUBLIC_SITE_URL=${{ vars.PUBLIC_SITE_URL || 'https://metodosnumericos.dev' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Check out deployment files
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
          persist-credentials: false

      - name: Configure verified SSH access
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST_FINGERPRINT: ${{ secrets.VPS_HOST_FINGERPRINT }}
        run: |
            set -eu
            install -d -m 700 "$HOME/.ssh"
            printf '%s\n' "$VPS_SSH_KEY" > "$HOME/.ssh/numerical-methods"
            chmod 600 "$HOME/.ssh/numerical-methods"

            ssh-keyscan -T 10 -p "$VPS_PORT" -t ed25519 "$VPS_HOST" \
              2>/dev/null > "$HOME/.ssh/known_hosts.candidate"
            actual_fingerprint=$(ssh-keygen -lf \
              "$HOME/.ssh/known_hosts.candidate" -E sha256 \
              | awk 'NR == 1 { print $2 }')
            [ "$actual_fingerprint" = "$VPS_HOST_FINGERPRINT" ] || {
              echo "The VPS host key did not match VPS_HOST_FINGERPRINT." >&2
              exit 1
            }
            mv "$HOME/.ssh/known_hosts.candidate" "$HOME/.ssh/known_hosts"

      - name: Copy deployment files
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
        run: |
          set -eu
          ssh -i "$HOME/.ssh/numerical-methods" \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            'rm -rf /tmp/numerical-methods-deploy && \
             install -d -m 700 /tmp/numerical-methods-deploy'
          scp -r -i "$HOME/.ssh/numerical-methods" \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -P "$VPS_PORT" docker-compose.prod.yml scripts \
            "$VPS_USER@$VPS_HOST:/tmp/numerical-methods-deploy/"

      - name: Deploy and verify
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          IMAGE: ${{ env.IMAGE }}
          APP_PORT: ${{ vars.APP_PORT || '4321' }}
        run: |
          set -eu
          ssh -i "$HOME/.ssh/numerical-methods" \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "IMAGE='$IMAGE' APP_PORT='$APP_PORT' sh -s" <<'EOF'
            set -eu
            install -d -m 700 "$HOME/apps/numerical-methods"
            install -m 600 /tmp/numerical-methods-deploy/docker-compose.prod.yml \
              "$HOME/apps/numerical-methods/docker-compose.prod.yml"
            install -m 700 /tmp/numerical-methods-deploy/scripts/deploy.sh \
              "$HOME/apps/numerical-methods/deploy.sh"
            rm -rf /tmp/numerical-methods-deploy
            cd "$HOME/apps/numerical-methods"
            ./deploy.sh
          EOF
