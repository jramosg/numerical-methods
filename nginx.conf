server {
  listen 8080;
  server_name _;
  server_tokens off;

  root /usr/share/nginx/html;
  index index.html;

  add_header Content-Security-Policy
    "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests"
    always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Permissions-Policy
    "camera=(), microphone=(), geolocation=(), payment=()"
    always;

  location / {
    try_files $uri $uri/ $uri.html =404;
  }

  location ~* \.(?:css|js|jpg|jpeg|png|gif|svg|webp|woff2?)$ {
    expires 7d;
  }
}
